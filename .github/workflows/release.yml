name: Release

on:
  push:
    tags:
      - 'v*'

env:
  TOOLCHAIN_VERSION: "20260430"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            toolchain: x86_64-unknown-linux-musl
          - arch: aarch64
            toolchain: aarch64-unknown-linux-musl
          - arch: arm
            toolchain: arm-unknown-linux-musleabi
          - arch: riscv64
            toolchain: riscv64-unknown-linux-musl
          - arch: loongarch64
            toolchain: loongarch64-unknown-linux-musl
          - arch: powerpc
            toolchain: powerpc-unknown-linux-musl
          - arch: s390x
            toolchain: s390x-ibm-linux-musl
    runs-on: ubuntu-24.04
    env:
      TOOLCHAIN_NAME: ${{ matrix.toolchain }}
      MUSL_PREFIX: ${{ github.workspace }}/../${{ matrix.toolchain }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download toolchain
        working-directory: ${{ github.workspace }}/..
        run: |
          wget -q "https://github.com/cross-tools/clang-cross/releases/download/${{ env.TOOLCHAIN_VERSION }}/${{ env.TOOLCHAIN_NAME }}.tar.xz"
          tar xf "${{ env.TOOLCHAIN_NAME }}.tar.xz"
          rm -f "${{ env.TOOLCHAIN_NAME }}.tar.xz"

      - name: Clone vmlinux.h
        run: |
          git clone https://github.com/libbpf/vmlinux.h.git vmlinux-headers
          cd vmlinux-headers
          git checkout 5c36ac2080a8d3c1216470ce97e6502ed50272e5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libelf-dev

      - name: Build libbpf
        run: |
          chmod +x ./.github/build_libbpf.sh
          MUSL_PREFIX=${{ env.MUSL_PREFIX }} TOOLCHAIN_NAME=${{ env.TOOLCHAIN_NAME }} ./.github/build_libbpf.sh

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ env.MUSL_PREFIX }}/bin/${{ env.TOOLCHAIN_NAME }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.MUSL_PREFIX }}/bin/${{ env.TOOLCHAIN_NAME }}-clang++ \
            -DSTATIC_LINKING=ON \
            -DUSE_PREBUILT_LIBBPF=ON \
            -DLIBBPF_INCLUDE_DIRS=${{ github.workspace }}/deps/output/include \
            -DLIBBPF_LIBRARIES=${{ github.workspace }}/deps/output/lib/libbpf.a \
            -DLIBBPF_DEPS_DIR=${{ github.workspace }}/deps/output \
            -DBPFOBJECT_VMLINUX_H=${{ github.workspace }}/vmlinux-headers/include/${{ matrix.arch }}/vmlinux.h \
            -DARCH=${{ matrix.arch }} \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/deps/output/include"

      - name: Build
        run: cmake --build build

      - name: Verify binary
        run: |
          file build/cabotisocks
          ls -lh build/cabotisocks

      - name: Package artifact
        run: |
          mkdir -p cabotisocks-linux-${{ matrix.arch }}
          cp build/cabotisocks cabotisocks-linux-${{ matrix.arch }}/
          cp config/config.example.json cabotisocks-linux-${{ matrix.arch }}/
          tar -cJf cabotisocks-linux-${{ matrix.arch }}.tar.xz cabotisocks-linux-${{ matrix.arch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabotisocks-${{ matrix.arch }}
          path: cabotisocks-linux-${{ matrix.arch }}.tar.xz

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: cabotisocks-*
          merge-multiple: true
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cabotisocks-linux-x86_64.tar.xz
            cabotisocks-linux-aarch64.tar.xz
            cabotisocks-linux-arm.tar.xz
            cabotisocks-linux-riscv64.tar.xz
            cabotisocks-linux-loongarch64.tar.xz
            cabotisocks-linux-powerpc.tar.xz
            cabotisocks-linux-s390x.tar.xz
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
